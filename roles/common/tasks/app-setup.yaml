- name: create system user roboshop #ansible user module does not have option to create user with shell, so we are using command module to create user with shell
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin  
      comment: "Roboshop system user"

- name: delete old app directory if exists #if developer run the playbook multiple times then it will delete the old app directory and create a new one, so that we can avoid any issues with old files
  ansible.builtin.file:
       path: /app
       state: absent
  
- name: create app directory #ansible app module does not have option to create directory with specific owner and group, so we are using file module to create directory with specific owner and group 
  ansible.builtin.file:
      path: /app
      state: directory

- name: delete {{ component }} zip file if exists #if developer run the playbook multiple times then it will delete the old {{ component }} zip file and download a new one, so that we can avoid any issues with old files
  ansible.builtin.file:
      path: /tmp/{{ component }}.zip
      state: absent

- name: Download {{ component }} code #ansible download file from s3 bucket using get_url module
  ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/{{ component }}-v3.zip
      dest: /tmp/{{ component }}.zip

- name: unzip the {{ component }} code  #ansible unzip the {{ component }} code using unarchive module
  ansible.builtin.unarchive:
      src: /tmp/{{ component }}.zip
      dest: /app
      remote_src: yes