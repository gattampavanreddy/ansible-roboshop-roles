plugin: amazon.aws.aws_ec2
regions:
  - us-east-1 
hostnames:
  - ip-address # This will fetch the public IP address of the EC2 instances
  # - private-ip-address # This will fetch the private IP address of the EC2 instances

filters:
  instance-state-name: running
  tag:Name: frontend-dev 
compose:
   #this sets the ansible_host variable connect with the private IP address without changing the hostname
    ansible_host: private-ip-address
keyed_groups:
  - separator: ' '
    key: tags.component