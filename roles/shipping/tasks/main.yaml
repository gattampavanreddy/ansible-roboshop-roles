- name: install maven and mysql client
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: present
  loop:
    - maven
    - mysql

- name: create system user roboshop #ansible user module does not have option to create user with shell, so we are using command module to create user with shell
  ansible.builtin.user:
    name: roboshop
    system: true
    home: /app
    shell: /sbin/nologin  
    comment: "Roboshop system user"

- name: delete old app directory if exists #if developer run the playbook multiple times then it will delete the old app directory and create a new one, so that we can avoid any issues with old files
  ansible.builtin.file:
      path: /app
      state: absent

- name: create app directory #ansible app module does not have option to create directory with specific owner and group, so we are using file module to create directory with specific owner and group 
  ansible.builtin.file:
    path: /app
    state: directory

- name: delete shipping zip file if exists #if developer run the playbook multiple times then it will delete the old  zip file and download a new one, so that we can avoid any issues with old files
  ansible.builtin.file:
    path: /tmp/shipping.zip
    state: absent

- name: Download shipping code #ansible download file from s3 bucket using get_url module
  ansible.builtin.get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip
    dest: /tmp/shipping.zip

- name: unzip the shipping code  #ansible unzip the shipping code using unarchive module
  ansible.builtin.unarchive:
    src: /tmp/shipping.zip
    dest: /app
    remote_src: yes

- name: install maven dependencies 
  ansible.builtin.command: mvn clean package 
  args:
    chdir: /app
  
- name: install maven dependencies 
  ansible.builtin.command: mv target/shipping-1.0.jar shipping.jar
  args:
    chdir: /app

- name: create systemctl services 
  ansible.builtin.template:
    src: shipping.service
    dest: /etc/systemd/system/shipping.service

- name: daemon reload
  ansible.builtin.systemd_service:
    daemon_reload: yes
  
- name: install dependency 
  ansible.builtin.pip:
      name: "{{ item }}"
      executable: pip3.9
  loop:
    -cryptography
    -PyMySQL

- name: import shipping data
  community.mysql.mysql_db:
    state: import
    name: all
    login_host: "{{ MYSQL_HOST }}"
    login_user: root
    login_password: "Roboshop@1"
    target: "{{ item }}"
  loop:
    - app/db/schema.sql
    - app/db/app-user.sql
    - app/db/master-data.sql

- name: start and enable shipping
  ansible.builtin.service:
    name: shipping
    enabled: yes
    state: restarted